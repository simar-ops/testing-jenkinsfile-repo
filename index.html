<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simarpreet | DevOps and Linux Portfolio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #161b22;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #58a6ff; margin-bottom: 0.5rem; }
        p { font-size: 1.1rem; line-height: 1.6; }
        .status {
            display: inline-block;
            padding: 5px 12px;
            background-color: #238636;
            color: white;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 1rem;
        }
        .links { margin-top: 2rem; }
        .links a {
            color: #58a6ff;
            text-decoration: none;
            margin: 0 10px;
            font-weight: bold;
        }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Simarpreet Singh</h1>
        <p> DevOps Engineer </p>
        <div class="status">● Pipeline Active</div>
        
        <div class="links">
            <a href="https://github.com/simar-ops" target="_blank">GitHub</a>
